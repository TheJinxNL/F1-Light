[platformio]
default_envs = esp32dev
src_dir = src

[env:esp32dev]
platform = espressif32@^6.9.0
board = esp32dev
framework = arduino

; JTAG debugging requires a hardware probe (e.g. ESP-PROG).
; No probe is connected — debug is disabled to suppress OpenOCD errors.
; To enable: set debug_tool = esp-prog (or jlink, cmsis-dap) and connect a probe.
debug_tool = esp-prog
debug_load_mode = always

; Retain modern GDB toolchain for when a probe is eventually connected.
platform_packages =
  espressif/toolchain-xtensa-esp32 @ 12.2.0+20230208
  platformio/tool-xtensa-esp-elf-gdb @ 14.2.0+20240403

; All firmware sources live in src/.

build_flags =
  -Wno-attributes
  -Wno-address-of-packed-member
  -Wl,--no-warn-rwx-segments
  -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/WiFi/src
  -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/WiFiClientSecure/src

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_speed = 921600

board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 4MB
board_build.f_flash = 80000000L
board_build.partitions = partitions_no_fs.csv

lib_ldf_mode = deep+
lib_deps =
  fastled/FastLED @ ^3.9.13
  links2004/WebSockets @ ^2.6.1
  bblanchon/ArduinoJson @ ^7.4.2
  tzapu/WiFiManager @ ^2.0.17
  adafruit/Adafruit GFX Library @ ^1.11.11
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
